// Real flag images embedded as WebP data URIs (no network needed),

function Flag({
  iso2,
  width = 160,
  className = ''
}) {
  const data = FLAG_DATA[iso2.toLowerCase()];
  if (!data) {
    return /*#__PURE__*/React.createElement("span", {
      className: `select-none ${className}`,
      style: {
        fontFamily: '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif',
        fontSize: '3em',
        lineHeight: 1
      }
    }, flagEmoji(iso2));
  }
  return /*#__PURE__*/React.createElement("img", {
    src: `data:image/webp;base64,${data}`,
    alt: `Flag of ${iso2}`,
    className: `rounded border border-slate-700 shadow-lg ${className}`,
    draggable: false
  });
}
